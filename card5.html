<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Toque Saude — Flower Assistant</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --wa-teal: #25D366;

  /* Gray theme for Card 5 */
  --wa-theme: #616161;
  --wa-theme-dark: #424242;
  --wa-theme-light: #9E9E9E;

  --wa-bg: #ECE5DD;
  --wa-time: #999;
  --wa-out: #DCF8C6;
  --danger: #B71C1C;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f0f0f0;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

.chat-screen {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--wa-bg);
}

.chat-header {
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: linear-gradient(135deg, var(--wa-theme-light), var(--wa-theme-dark));
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.header-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.header-info h2 {
  font-size: 16px;
  font-weight: 700;
  color: white;
}

.header-info p {
  font-size: 12px;
  color: rgba(255,255,255,0.88);
}

.chat-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 12px 20px;
}

.bubble-wrap {
  display: flex;
  margin-bottom: 4px;
}

.bubble-wrap.in {
  justify-content: flex-start;
}

.bubble-wrap.out {
  justify-content: flex-end;
}

.bubble {
  max-width: 80%;
  padding: 8px 12px 6px;
  border-radius: 8px;
  font-size: 14px;
  line-height: 1.5;
  box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  animation: popIn 0.25s ease;
}

.bubble.in {
  background: white;
  border-top-left-radius: 0;
}

.bubble.out {
  background: var(--wa-out);
  border-top-right-radius: 0;
}

.bubble .time {
  font-size: 11px;
  color: var(--wa-time);
  text-align: right;
  margin-top: 2px;
}

@keyframes popIn {
  from {
    opacity: 0;
    transform: scale(0.92) translateY(6px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

@keyframes retractOut {
  from {
    opacity: 1;
    transform: scale(1);
    max-height: 500px;
  }
  to {
    opacity: 0;
    transform: scale(0.92);
    max-height: 0;
    margin-bottom: 0;
  }
}

.retracting {
  animation: retractOut 0.35s ease forwards;
  overflow: hidden;
}

.date-divider {
  text-align: center;
  margin: 12px 0 8px;
}

.date-divider span {
  background: rgba(225,200,160,0.7);
  color: #666;
  font-size: 11.5px;
  padding: 4px 12px;
  border-radius: 12px;
}

.system-bubble {
  background: rgba(255,255,255,0.88);
  text-align: center;
  font-size: 12px;
  color: #666;
  border-radius: 8px;
  padding: 6px 12px;
  max-width: 85%;
  margin: 0 auto 8px;
}

.typing-wrap {
  display: flex;
  margin-bottom: 8px;
}

.typing-indicator {
  background: white;
  border-radius: 8px;
  border-top-left-radius: 0;
  padding: 12px 16px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  display: flex;
  gap: 4px;
}

.typing-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #aaa;
  animation: typingBounce 1.2s ease-in-out infinite;
}

.typing-dot:nth-child(2) {
  animation-delay: .15s;
}

.typing-dot:nth-child(3) {
  animation-delay: .3s;
}

@keyframes typingBounce {
  0%, 60%, 100% {
    transform: translateY(0);
  }
  30% {
    transform: translateY(-6px);
  }
}

/* Audio bubble */
.bubble.audio-bubble {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 210px;
  cursor: pointer;
  transition: background 0.2s;
}

.bubble.audio-bubble:active {
  background: #f0f0f0;
}

.audio-play-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--wa-theme);
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.audio-wave {
  flex: 1;
  height: 24px;
  display: flex;
  align-items: center;
  gap: 2px;
}

.audio-wave span {
  display: block;
  width: 3px;
  background: #aaa;
  border-radius: 2px;
}

.audio-wave.playing span {
  animation: wave 1.2s ease-in-out infinite;
  background: var(--wa-theme);
}

.audio-wave span:nth-child(1){height:8px;}
.audio-wave span:nth-child(2){height:16px;animation-delay:.1s;}
.audio-wave span:nth-child(3){height:22px;animation-delay:.2s;}
.audio-wave span:nth-child(4){height:12px;animation-delay:.3s;}
.audio-wave span:nth-child(5){height:18px;animation-delay:.4s;}
.audio-wave span:nth-child(6){height:10px;animation-delay:.5s;}
.audio-wave span:nth-child(7){height:20px;animation-delay:.6s;}
.audio-wave span:nth-child(8){height:14px;animation-delay:.7s;}

@keyframes wave {
  0%,100% {
    opacity:.4;
    transform:scaleY(.7);
  }
  50% {
    opacity:1;
    transform:scaleY(1);
  }
}

.audio-dur {
  font-size: 12px;
  color: var(--wa-time);
  font-weight: 700;
  pointer-events: none;
}

/* Info card */
.info-card {
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid #e0e0e0;
}

.info-card .ic-header {
  padding: 10px 12px;
  font-weight: 700;
  font-size: 13px;
  color: white;
  background: var(--wa-theme);
}

.info-card .ic-body {
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.6;
  color: #333;
  background: white;
}

/* Quick replies */
.quick-reply-area {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 8px 12px 4px;
}

.qr-btn {
  background: white;
  border: 1.5px solid var(--wa-theme);
  color: var(--wa-theme-dark);
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.qr-btn:hover {
  background: var(--wa-theme);
  color: white;
}

.qr-btn.sos {
  border-color: var(--danger);
  color: var(--danger);
}

.qr-btn.sos:hover {
  background: var(--danger);
  color: white;
}

.chat-input-bar {
  padding: 8px 12px;
  background: #f0f0f0;
  display: flex;
  align-items: center;
  gap: 10px;
  border-top: 1px solid #ddd;
}

.chat-input {
  flex: 1;
  background: white;
  border: none;
  border-radius: 24px;
  padding: 10px 16px;
  font-size: 14px;
  outline: none;
}

.send-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--wa-teal);
  border: none;
  color: white;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* SOS safe mode */
.safe-panel {
  background: #212121;
  color: white;
  border-radius: 10px;
  padding: 12px;
  font-size: 13px;
  line-height: 1.6;
}

.safe-panel strong {
  color: #ffebee;
}

.countdown {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  color: white;
  padding: 2px 8px;
  border-radius: 12px;
  font-weight: 700;
  margin-top: 6px;
}
</style>
</head>

<body>
<div class="chat-screen">

  <div class="chat-header">
    <div class="header-avatar">🌻</div>
    <div class="header-info">
      <h2>Flower Assistant</h2>
      <p>🟢 Online · Gardening Tips</p>
    </div>
  </div>

  <div class="chat-body" id="chatBody">
    <div class="date-divider"><span>Today</span></div>

    <div class="bubble-wrap out">
      <div class="bubble out">
        GET_FLOWER_TIPS
        <div class="time">✓✓ just now</div>
      </div>
    </div>

    <div id="typing" class="typing-wrap">
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  </div>

  <div class="quick-reply-area" id="qrArea" style="display:none">
    <button class="qr-btn" onclick="wateringTips()">💧 Watering Tips</button>
    <button class="qr-btn sos" onclick="requestRoses()">🔴 Request Red Roses (SOS)</button>
  </div>

  <div class="chat-input-bar">
    <input class="chat-input" placeholder="System replies automatically..." readonly>
    <button class="send-btn">🎤</button>
  </div>

</div>

<script>
const body = document.getElementById('chatBody');
const typing = document.getElementById('typing');
const qr = document.getElementById('qrArea');

let audioCount = 0;
let selfDestructTimer = null;
let countdownValue = 15;
let currentAlertBubble = null;

function getTime() {
  const n = new Date();
  return `${n.getHours()}:${String(n.getMinutes()).padStart(2, '0')}`;
}

function addMsg(html, delay) {
  return new Promise(resolve => {
    setTimeout(() => {
      const d = document.createElement('div');
      d.className = 'bubble-wrap in';
      d.innerHTML = `<div class="bubble in">${html}</div>`;
      body.insertBefore(d, typing);
      body.scrollTop = body.scrollHeight;
      resolve(d);
    }, delay);
  });
}

function addOutMsg(html) {
  const d = document.createElement('div');
  d.className = 'bubble-wrap out';
  d.innerHTML = `<div class="bubble out">${html}<div class="time">${getTime()}</div></div>`;
  body.appendChild(d);
  body.scrollTop = body.scrollHeight;
  return d;
}

function addRealAudioBubble(audioFileName, delay) {
  return new Promise(resolve => {
    setTimeout(() => {
      audioCount++;
      const currentId = 'voiceMsg' + audioCount;

      const d = document.createElement('div');
      d.className = 'bubble-wrap in';

      d.innerHTML = `
        <div class="bubble in audio-bubble" onclick="togglePlay('${currentId}', this)">
          <audio id="${currentId}" src="${audioFileName}" onended="resetPlayer('${currentId}')" preload="auto"></audio>
          <button class="audio-play-btn">▶</button>
          <div class="audio-wave" id="wave-${currentId}">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
          </div>
          <span class="audio-dur">Play</span>
        </div>
      `;

      body.insertBefore(d, typing);
      body.scrollTop = body.scrollHeight;
      resolve();
    }, delay);
  });
}

window.togglePlay = function(audioId, bubbleElement) {
  const audioObj = document.getElementById(audioId);
  const playBtn = bubbleElement.querySelector('.audio-play-btn');
  const wave = document.getElementById('wave-' + audioId);

  if (audioObj.paused) {
    document.querySelectorAll('audio').forEach(a => {
      if (a.id !== audioId) {
        a.pause();
        resetPlayer(a.id);
      }
    });

    audioObj.play();
    playBtn.innerHTML = '⏸';
    wave.classList.add('playing');
  } else {
    audioObj.pause();
    playBtn.innerHTML = '▶';
    wave.classList.remove('playing');
  }
};

window.resetPlayer = function(audioId) {
  const audioObj = document.getElementById(audioId);

  if (audioObj && audioObj.parentElement) {
    const playBtn = audioObj.parentElement.querySelector('.audio-play-btn');
    const wave = document.getElementById('wave-' + audioId);

    if (playBtn) playBtn.innerHTML = '▶';
    if (wave) wave.classList.remove('playing');
  }
};

window.onload = () => {
  addMsg(
    `<div class="system-bubble">
      🌻 NFC Activated · GET_FLOWER_TIPS<br>
      <span style="color:var(--wa-theme-dark)">Flower assistant connected</span>
    </div>`,
    800
  );

  addMsg(
    `Hello! 👋 I am your <strong>Flower Assistant</strong>.<br>
    I can help you care for your plants and choose the right flowers for today.
    <div class="time">${getTime()} ✓✓</div>`,
    1800
  );

  addRealAudioBubble('flower_intro.mp3', 2400);

  addMsg(
    `<div class="info-card">
      <div class="ic-header">🌱 Basic Gardening Tips</div>
      <div class="ic-body">
        <ul>
          <li>💧 Water plants according to soil dryness.</li>
          <li>☀️ Keep flowers in gentle sunlight when possible.</li>
          <li>🌿 Remove dry leaves to help new growth.</li>
          <li>🌹 Red roses need careful watering and attention.</li>
        </ul>
      </div>
    </div>
    <div class="time">${getTime()} ✓✓</div>`,
    3800
  );

  addMsg(
    `Choose one of the options below to continue.
    <div class="time">${getTime()} ✓✓</div>`,
    5200
  ).then(() => {
    typing.style.display = 'none';
    qr.style.display = 'flex';
    body.scrollTop = body.scrollHeight;
  });
};

function wateringTips() {
  qr.style.display = 'none';
  addOutMsg('💧 Watering Tips');

  typing.style.display = 'flex';
  body.scrollTop = body.scrollHeight;

  addMsg(
    `For most indoor flowers, check the soil first.<br><br>
    If the top soil feels dry, water gently. Avoid leaving water at the bottom of the pot.
    <div class="time">${getTime()} ✓✓</div>`,
    1200
  ).then(() => {
    typing.style.display = 'none';
    qr.style.display = 'flex';
  });
}

function requestRoses() {
  qr.style.display = 'none';
  addOutMsg('🔴 Request Red Roses');

  typing.style.display = 'flex';
  body.scrollTop = body.scrollHeight;

  addMsg(
    `<div class="safe-panel">
      <strong>Silent request sent.</strong><br>
      Your trusted contact has been notified with your current help request.<br><br>
      This alert message will be withdrawn automatically.
      <br>
      <span class="countdown">
        Withdraw in <span id="countdown">15</span>s
      </span>
    </div>
    <div class="time">${getTime()} ✓✓</div>`,
    1200
  ).then((alertBubbleElement) => {
    typing.style.display = 'none';

    // 关键修复：记录这条告警消息本身，15秒后删除它
    currentAlertBubble = alertBubbleElement;

    startSelfDestruct();
  });
}

function startSelfDestruct() {
  countdownValue = 15;

  if (selfDestructTimer) {
    clearInterval(selfDestructTimer);
  }

  selfDestructTimer = setInterval(() => {
    countdownValue--;

    const countdown = document.getElementById('countdown');
    if (countdown) {
      countdown.textContent = countdownValue;
    }

    if (countdownValue <= 0) {
      clearInterval(selfDestructTimer);
      withdrawAlertMessage();
    }
  }, 1000);
}

function withdrawAlertMessage() {
  if (currentAlertBubble && currentAlertBubble.parentNode) {
    currentAlertBubble.classList.add('retracting');

    setTimeout(() => {
      if (currentAlertBubble && currentAlertBubble.parentNode) {
        currentAlertBubble.parentNode.removeChild(currentAlertBubble);
      }

      currentAlertBubble = null;
      qr.style.display = 'flex';
      body.scrollTop = body.scrollHeight;
    }, 350);
  } else {
    qr.style.display = 'flex';
  }
}
</script>

</body>
</html>
