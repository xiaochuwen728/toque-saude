
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Toque Saude — Menstrual Health</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --wa-green: #075E54; --wa-teal: #25D366; --wa-bubble-in: #FFFFFF; --wa-bg: #ECE5DD; --wa-time: #999; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; display: flex; justify-content: center; min-height: 100vh; }
.chat-screen { width: 100%; max-width: 420px; min-height: 100vh; display: flex; flex-direction: column; background: var(--wa-bg); }
.chat-header { padding: 10px 16px; display: flex; align-items: center; gap: 12px; background: linear-gradient(135deg, #7B1FA2, #9C27B0); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.header-avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; font-size: 22px; }
.header-info h2 { font-size: 16px; font-weight: 700; color: white; }
.header-info p { font-size: 12px; color: rgba(255,255,255,0.85); }
.chat-body { flex: 1; overflow-y: auto; padding: 16px 12px 20px; background: var(--wa-bg); }
.bubble-wrap { display: flex; margin-bottom: 4px; }
.bubble-wrap.in { justify-content: flex-start; }
.bubble-wrap.out { justify-content: flex-end; }
.bubble { max-width: 78%; padding: 8px 12px 6px; border-radius: 8px; font-size: 14px; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,0.15); animation: popIn 0.25s ease; }
@keyframes popIn { from { opacity:0; transform: scale(0.92) translateY(6px); } to { opacity:1; transform: scale(1) translateY(0); } }
.bubble.in { background: var(--wa-bubble-in); border-top-left-radius: 0; }
.bubble.out { background: #DCF8C6; border-top-right-radius: 0; }
.bubble .time { font-size: 11px; color: var(--wa-time); text-align: right; margin-top: 2px; }

/* Audio Bubble UI styling */
.bubble.audio-bubble { display: flex; align-items: center; gap: 10px; min-width: 200px; cursor: pointer; transition: background 0.2s; }
.bubble.audio-bubble:active { background: #f0f0f0; }
.audio-play-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--wa-teal); border: none; color: white; font-size: 16px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.audio-wave { flex: 1; height: 24px; display: flex; align-items: center; gap: 2px; }
.audio-wave span { display: block; width: 3px; background: #aaa; border-radius: 2px; }
.audio-wave.playing span { animation: wave 1.2s ease-in-out infinite; }
.audio-wave span:nth-child(1){ height:8px; } .audio-wave span:nth-child(2){ height:16px; animation-delay:0.1s; } .audio-wave span:nth-child(3){ height:22px; animation-delay:0.2s; } .audio-wave span:nth-child(4){ height:12px; animation-delay:0.3s; } .audio-wave span:nth-child(5){ height:18px; animation-delay:0.4s; } .audio-wave span:nth-child(6){ height:10px; animation-delay:0.5s; } .audio-wave span:nth-child(7){ height:20px; animation-delay:0.6s; } .audio-wave span:nth-child(8){ height:14px; animation-delay:0.7s; }
@keyframes wave { 0%,100%{ opacity:0.4; transform:scaleY(0.7); } 50%{ opacity:1; transform:scaleY(1); } }
.audio-dur { font-size: 12px; color: var(--wa-time); font-weight: bold; pointer-events: none; }

.info-card { border-radius: 8px; overflow: hidden; border: 1px solid #e0e0e0; }
.info-card .ic-header { padding: 10px 12px; font-weight: 700; font-size: 13px; color: white; }
.info-card .ic-body { padding: 10px 12px; font-size: 13px; line-height: 1.6; color: #333; background: white; }
.info-card .ic-body ul { padding-left: 18px; }
.info-card .ic-body li { margin-bottom: 4px; }
.typing-wrap { display: flex; margin-bottom: 8px; }
.typing-indicator { background: white; border-radius: 8px; border-top-left-radius: 0; padding: 12px 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.15); display: flex; gap: 4px; align-items: center; }
.typing-dot { width: 8px; height: 8px; border-radius: 50%; background: #aaa; animation: typingBounce 1.2s ease-in-out infinite; }
.typing-dot:nth-child(2){ animation-delay: 0.15s; } .typing-dot:nth-child(3){ animation-delay: 0.3s; }
@keyframes typingBounce { 0%,60%,100%{ transform:translateY(0); } 30%{ transform:translateY(-6px); } }
.quick-reply-area { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 12px 4px; }
.qr-btn { background: white; border: 1.5px solid #7B1FA2; color: #7B1FA2; border-radius: 20px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.qr-btn:hover { background: #7B1FA2; color: white; }
.qr-btn.secondary { border-color: #888; color: #888; }
.qr-btn.secondary:hover { background: #888; color: white; }
.chat-input-bar { padding: 8px 12px; background: #f0f0f0; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
.chat-input { flex:1; background: white; border: none; border-radius: 24px; padding: 10px 16px; font-size: 14px; outline: none; color: #333; }
.send-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--wa-teal); border: none; color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.date-divider { text-align: center; margin: 12px 0 8px; }
.date-divider span { background: rgba(225,200,160,0.7); color: #666; font-size: 11.5px; padding: 4px 12px; border-radius: 12px; }
.system-bubble { background: rgba(255,255,255,0.85); text-align: center; font-size: 12px; color: #666; border-radius: 8px; padding: 6px 12px; max-width: 85%; margin: 0 auto 8px; }
</style>
</head>
<body>
<div class="chat-screen">
  <div class="chat-header">
    <div class="header-avatar">🌿</div>
    <div class="header-info"><h2>Toque Saude — Assistant</h2><p>🟣 Menstrual Health · Audio Guide</p></div>
  </div>
  <div class="chat-body" id="chatBody">
    <div class="date-divider"><span>Today</span></div>
    <div class="bubble-wrap out"><div class="bubble out">GET_MENSTRUAL_FLOW<div class="time">✓✓ just now</div></div></div>
    <div id="typing" class="typing-wrap"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>
  </div>
  <div class="quick-reply-area" id="qrArea" style="display:none">
    <button class="qr-btn" onclick="step2()">🔊 Repeat audio</button>
    <button class="qr-btn" onclick="step3()">📅 Calculate next cycle</button>
    <button class="qr-btn secondary" onclick="step4()">👩‍⚕️ Call CHW</button>
  </div>
  <div class="chat-input-bar"><input class="chat-input" placeholder="System replies automatically..." readonly><button class="send-btn">🎤</button></div>
</div>

<script>
const body = document.getElementById('chatBody');
const typing = document.getElementById('typing');
const qr = document.getElementById('qrArea');
const t = () => { const n=new Date(); return `${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`; };

// Global audio ID counter to handle multiple audio bubbles
let audioCount = 0;

function addMsg(html, delay) {
  return new Promise(r => setTimeout(() => {
    const d = document.createElement('div');
    d.className = 'bubble-wrap in';
    d.innerHTML = `<div class="bubble in">${html}</div>`;
    body.insertBefore(d, typing);
    body.scrollTop = body.scrollHeight;
    r();
  }, delay));
}

// Upgraded Audio Bubble Function with actual <audio> tag injection
function addRealAudioBubble(audioFileName, delay) {
  return new Promise(r => setTimeout(() => {
    audioCount++;
    const currentId = 'voiceMsg' + audioCount;
    const d = document.createElement('div');
    d.className = 'bubble-wrap in';
    
    // HTML for the playable audio bubble
    d.innerHTML = `
      <div class="bubble in audio-bubble" onclick="togglePlay('${currentId}', this)">
        <audio id="${currentId}" src="${audioFileName}" onended="resetPlayer('${currentId}')" preload="auto"></audio>
        <button class="audio-play-btn">▶</button>
        <div class="audio-wave" id="wave-${currentId}">
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <span class="audio-dur">Play</span>
      </div>
    `;
    
    body.insertBefore(d, typing);
    body.scrollTop = body.scrollHeight;
    r();
  }, delay));
}

// Function to handle Play/Pause logic
window.togglePlay = function(audioId, bubbleElement) {
  const audioObj = document.getElementById(audioId);
  const playBtn = bubbleElement.querySelector('.audio-play-btn');
  const wave = document.getElementById('wave-' + audioId);
  
  if (audioObj.paused) {
    // Pause any other playing audios first (optional but good practice)
    document.querySelectorAll('audio').forEach(a => { 
        if(a.id !== audioId) { a.pause(); resetPlayer(a.id); } 
    });
    
    audioObj.play();
    playBtn.innerHTML = '⏸';
    wave.classList.add('playing');
  } else {
    audioObj.pause();
    playBtn.innerHTML = '▶';
    wave.classList.remove('playing');
  }
};

// Function triggered when audio finishes playing naturally
window.resetPlayer = function(audioId) {
  const audioObj = document.getElementById(audioId);
  if(audioObj) {
      const bubble = audioObj.parentElement;
      const playBtn = bubble.querySelector('.audio-play-btn');
      const wave = document.getElementById('wave-' + audioId);
      playBtn.innerHTML = '▶';
      wave.classList.remove('playing');
  }
};

window.onload = () => {
  addMsg(`<div class="system-bubble">🔔 NFC Activated · GET_MENSTRUAL_FLOW · <span style="color:#25D366">Audio Path Connected</span></div>`, 800);
  addMsg(`Hello! I am the <strong>Toque Saude</strong> health assistant 👋<br>I will guide you with information about <strong>menstrual health</strong>.<div class="time">${t()} ✓✓</div>`, 1800);
  
  setTimeout(() => { typing.style.display='none'; }, 2500);
  
  // 🌟 Inject the real audio file here! 
  addRealAudioBubble('menstrual_intro.mp3', 2800);
  
  addMsg(`<div class="info-card"><div class="ic-header" style="background:#7B1FA2">🩸 Basic Menstrual Cycle Info</div><div class="ic-body"><ul><li>🔴 Normal cycle: <strong>21–35 days</strong></li><li>📅 Duration: <strong>3–7 days</strong> is normal</li><li>🩺 Alert: extremely heavy bleeding — seek medical care</li><li>💧 Change: every <strong>4–6 hours</strong></li></ul></div></div><div class="time">${t()} ✓✓</div>`, 4500);
  addMsg(`You felt <strong>1 circular notch</strong> in the top right corner 🟣 — this is the tactile mark for the menstrual card.<br><br>Tap the buttons below to continue.<div class="time">${t()} ✓✓</div>`, 6500);
  setTimeout(() => { qr.style.display='flex'; }, 7000);
};

function step2() { 
  qr.style.display='none'; 
  typing.style.display='flex';
  addRealAudioBubble('menstrual_intro.mp3', 1000); 
  addMsg(`🔊 Audio message sent again.<div class="time">${t()} ✓✓</div>`, 1500); 
  setTimeout(()=>{qr.style.display='flex'; typing.style.display='none';}, 2000); 
}
function step3() { 
  qr.style.display='none'; 
  const o=document.createElement('div');o.className='bubble-wrap out';
  o.innerHTML=`<div class="bubble out">📅 Calculate next cycle<div class="time">${t()}</div></div>`;
  body.appendChild(o); 
  addMsg(`Please tell me the <strong>start date of your last period</strong>.<br><br>(Example: May 10th)<div class="time">${t()} ✓✓</div>`, 1200); 
}
function step4() { 
  qr.style.display='none'; 
  const o=document.createElement('div');o.className='bubble-wrap out';
  o.innerHTML=`<div class="bubble out">👩‍⚕️ Call CHW<div class="time">${t()}</div></div>`;
  body.appendChild(o); 
  addMsg(`✅ Connecting with the CHW (Community Health Worker) responsible for your neighborhood...<br><br>📞 Estimated time: <strong>~5 minutes</strong><br>Maré Clinic · Mon to Fri 8:00–17:00<div class="time">${t()} ✓✓</div>`, 1200); 
}
</script>
</body>
</html>
